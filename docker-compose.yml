x-volumes: &app-volumes
  - ./src:/opt/airflow/src
  - ./data:/opt/airflow/data
  - ./config.py:/opt/airflow/config.py
  - ./spark_session.py:/opt/airflow/spark_session.py

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "=== Medallion Pipeline ==="
        echo "--- Generating data ---"
        python src/data_generation/generate_all.py
        echo "--- Bronze ingestion ---"
        python src/bronze/ingest_to_bronze.py
        echo "--- Silver transformation ---"
        python src/silver/transform_to_silver.py
        echo "--- Gold star schema ---"
        python src/gold/build_gold_star_schema.py
        echo "=== Pipeline Complete ==="
    volumes: *app-volumes
    environment:
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
      PYTHONPATH: /opt/airflow
    restart: "no"

  spark-thrift:
    profiles: ["query"]
    build:
      context: .
      dockerfile: Dockerfile.spark-thrift
    ports:
      - "10000:10000"
    volumes:
      - ./data:/opt/airflow/data
    restart: unless-stopped

  metabase:
    profiles: ["query"]
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      JAVA_OPTS: "-Xmx256m -XX:+UseG1GC"
    depends_on:
      - spark-thrift
    restart: unless-stopped
